
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恢复数据</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      min-height: 100vh;
    }
    .container {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 16px;
      padding: 30px;
    }
    h1 { margin-top: 0; }
    .box {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    button {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:active { transform: scale(0.98); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-num {
      font-size: 32px;
      font-weight: bold;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 恢复你的数据</h1>
    
    <div class="box">
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="bookCount">0</div>
          <div>本书籍（含封面图和数据图）</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="workoutCount">0</div>
          <div>条运动记录</div>
        </div>
      </div>
    </div>
    
    <button onclick="restoreData()">恢复数据</button>
    
    <div class="box" id="status" style="margin-top: 20px; display: none;"></div>
    
    <div class="box" style="margin-top: 20px;">
      <p><strong>说明：</strong></p>
      <p>点击上方按钮恢复数据后，<a href="./" style="color: #60a5fa; text-decoration: underline;">点击这里回到应用首页</a> 刷新查看！</p>
    </div>
  </div>

  <script src="restore-data.js"></script>
</body>
</html>
